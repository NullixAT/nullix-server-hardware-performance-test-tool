name: NSHPTT Go Source Tests
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  go-tests:
    runs-on: ubuntu-latest
    steps:
    
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: false
          
      - name: Display Go version
        run: go version
          
      - name: Run setup
        run: bash setup.sh
          
      - name: Run tests
        run: bash tests/run_tests.sh
          
      - name: Run build
        run: bash build.sh

      - name: Upload results after tests
        if: always()
        uses: actions/upload-artifact@v3.2.2
        with:
          name: test-results
          path: ./nshptt/results
          retention-days: 5
